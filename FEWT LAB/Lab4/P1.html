<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-4-P1</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter the number:"))
        document.write("Factors : ")

        for(let i=0;i<=n;i++){
            if(n%i==0){
                document.write(i+" ")
            }
        }
    </script>
</body>
</html>
