<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-4-P2</title>
</head>
<body>
    <script>
        start=parseInt(prompt("Enter the start number:"))
        end=parseInt(prompt("Enter the end number:"))
        for(let i=start;i<=end;i++){
            document.write("Factors of "+i+": ")
            for(let j=0;j<=i;j++){
            if(i%j==0){
                document.write(j+" ")
            }
        }
        document.write("<br/>")
        }
    </script>
</body>
</html>
