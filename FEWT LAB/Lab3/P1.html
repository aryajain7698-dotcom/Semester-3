<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-3-P1</title>
</head>
<body>
    <script>
        a=parseInt(prompt("Enter first number:"))
        b=parseInt(prompt("Enter second number:"))
        c=prompt("Enter the operation(+,-,*,/):")
        
        switch (c) {
            case '+':
                alert("The addition of two numbers is "+(a+b));
                break;
            case '-':
                alert("The substraction of two numbers is "+(a-b));
                break;
            case '*':
                alert("The multiplication of two numbers is "+(a*b));
                break;
            case '/':
                alert("The division of two numbers is "+(a/b));
                break;
            default:
                break;
        }
    </script>
</body>
</html>
