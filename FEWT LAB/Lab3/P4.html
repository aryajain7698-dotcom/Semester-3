<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-3-P4</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter the number:"))
        a=0;
        b=1;
        c=0;
        for(let i=1;i<=n;i++){
            document.write(a+" ")
            c=a+b
            a=b;
            b=c;
        }
    </script>
</body>
</html>
