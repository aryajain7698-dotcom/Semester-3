<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-3-P2</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter the number:"))
        b=false
        for(let i=2;i<n;i++){
            if(n%i==0){
                b=true;
                break;
            }
        }
        if(b){
            alert("not prime")
        }else{
            alert("prime")
        }
    </script>
</body>
</html>
