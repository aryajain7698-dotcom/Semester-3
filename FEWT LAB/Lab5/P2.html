<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-5-P2</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter the size of array:"))
        let a=[]
        for(let i=0;i<n;i++){
            b=parseInt(prompt("Enter the number: "))
            a.push(b)
        }
        for(let i=0;i<a.length-1;i++){
            for(let j=i+1;j<a.length;j++){
                if(a[i]>a[j]){
                    let temp=a[i]
                    a[i]=a[j]
                    a[j]=temp
                }
            }
        }
        document.write("The final ascending array: "+a)
    </script>
</body>
</html>
