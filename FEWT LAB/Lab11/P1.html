<!DOCTYPE html>

<body>
    <script>
        class Student{
            constructor(name,age){
            this.name=name;
            this.age=age;
            }
        }

        function display(){
            let s1=new Student("Arya",18);
            document.write("Name: "+s1.name+" Age: "+s1.age);
        }
        display();
        
    </script>    
</body>
