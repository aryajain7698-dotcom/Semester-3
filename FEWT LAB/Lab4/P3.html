<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-4-P3</title>
</head>
<body>
    <script>
        for(let i=0;i<4;i++){
            for(let j=1;j<=4-i;j++){
                document.write(j+" ")
            }
            document.write("<br/>")
        }
        document.write("<br/>")
        a=1
        for(let i=1;i<=4;i++){
            if(i%2==0){
                a=2
            }else{
                a=1
            }
            for(let j=0;j<i;j++){
                if(a%2==0){
                    document.write("0 ")
                }else{
                    document.write("1 ")
                }
                a++
            }
            document.write("<br/>")   
        }
        document.write("<br/>")
        for(let i=1;i<=5;i++){
            for(let j=4;j>=i;j--){
                document.write("&nbsp;")
            }
            for(let j=0;j<i;j++){
                document.write("* ")
            }
            document.write("<br/>")
        }
    </script>
</body>
</html>
