<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-3-P3</title>
</head>
<body>
    <script>
        n=parseInt(prompt("Enter the number:"))
        fact=1;
        for(let i=2;i<=n;i++){
            fact=fact*i;
        }
        alert("The factorial is "+fact)
    </script>
</body>
</html>
