<!-- Display Floor, Ceiling, Round, and Truncate values of a decimal number.  -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-Extra-P3</title>
</head>
<body>
    <script>
        let n=parseFloat(prompt("Enter a number:"));
        document.write("Maths.max="+Math.floor(n)+"</br>");
        document.write("Maths.min="+Math.ceil(n)+"</br>");
        document.write("Maths.round="+Math.round(n)+"</br>");
        document.write("Maths.trunc="+Math.trunc(n)+"</br>");
    </script>
</body>
</html>
