<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab9-P3</title>
</head>
<body>
    <table cellspacing="10">
        <tr>
            <td>
                <label for="name">Name</label>
            </td>
            <td>
                <input type="text" id="name">
            </td>
            <td>
                <button id="add" onclick="addStu()">ADD</button>
            </td>
            <td>
                <button id="update" onclick="updateStu()">UPDATE</button>
            </td>
        </tr>
    </table>

    <table border="1" cellspacing="0">
        <thead>
            <tr>
                <th class="id">ID</th>
                <th class="name">Name</th>
                <th class="action">Action</th>
            </tr>
        </thead>
        <tbody id="tablebody"></tbody>
    </table>

    <script>
        arr = [];
        temp = '';

        function display(){
            temp = '';
            for(i=0; i<arr.length; i++){
                temp += `
                <tr>
                    <td>${i+1}</td>
                    <td>${arr[i]}</td>
                    <td><button id="edit" onclick='editStu(${i})'>EDIT</button> <button id="delete" onclick='deleteStu(${i})'>DELETE</button></td>
                </tr>
                `
            }
            document.getElementById('tablebody').innerHTML = temp;
        }

        function addStu(){
            n = document.getElementById('name').value;

            if(n == ''){
                alert('Enter Name!!!');
                return;
            }

            arr.push(n);
            display();
            document.getElementById('name').value = '';
        }

        function deleteStu(i){
            arr.splice(i,1);
            display();
        }

        index = -1;
        function editStu(i){
            document.getElementById('name').value = arr[i];
            index = i;
        }

        function updateStu(){
            if(index != -1){
                arr[index] = document.getElementById('name').value;
                display();
                document.getElementById('name').value = '';
            }
            else{
                alert('Select Student Name!!!')
            }
            index = -1
        }
    </script>
</body>
</html>
