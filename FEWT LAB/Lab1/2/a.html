<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab2-a</title>
    <style>
        a{
            color: orange;
        }
        a:visited{
            color: red;
        }
        .p1::first-line{
            color: blue;
            font-size: large;
        }
        .p2::first-letter{
            color: green;
            font-size: larger;
        }
        .p2::selection{
            background-color: yellow;
        }
        .p3:hover{
            color: yellow;
            background-color: blue;
        }
    </style>
</head>
<body>
    <a href="#">hello world</a>
    <p class="p1">hello world <br>bye world</p>
    <p class="p2">hello world</p>
    <p class="p3">Computer Engineering</p>
</body>
</html>
