<body>
    <input type="text" onke id="showEvent"/>
    <h1 id="text"></h1>

        function showEvent(){
            document.getElementById("showEvent").addEventListener('keydown',()=>{document.getElementById("text").innerHTML="Key down"});
            document.getElementById("showEvent").addEventListener('keyup',()=>{document.getElementById("text").innerHTML="Key up"});
            document.getElementById("showEvent").addEventListener('keypress',()=>{document.getElementById("text").innerHTML="Key press"});
        }
    </script>
