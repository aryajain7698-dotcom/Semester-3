<!-- Display the Current Date, Time, Day, Month, and Year using the Date object. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-Extra-P4</title>
</head>
<body>
    <script>
        let n1=new Date();
        document.write("Date="+n1+"</br>");
        document.write("Time="+n1.getTime()+"</br>");
        document.write("Day="+n1.getDay()+"</br>");
        document.write("Month="+n1.getMonth()+"</br>");
        document.write("Year="+n1.getFullYear()+"</br>");
        document.write("Hour="+n1.getHours()+"</br>");
        document.write("Minutes="+n1.getMinutes()+"</br>");
        document.write("Second="+n1.getSeconds()+"</br>");
        document.write("Millisecond="+n1.getMilliseconds()+"</br>");
    </script>
</body>
</html>
