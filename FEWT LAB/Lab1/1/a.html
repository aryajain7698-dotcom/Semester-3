<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab1-a</title>
    <style>
        .a{
            height: 100px;
            width: 100px;
            background-color: red;
            animation-name: convert;
            animation-duration: 2s;
            animation-timing-function: ease;
        }
        @keyframes convert{
            from{
                background-color: red;
            }
            to{
                background-color: yellow;
            }
        }
    </style>
</head>
<body>
    <div class="a"></div>
</body>
</html>
