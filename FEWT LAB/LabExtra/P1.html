<!-- Find Maximum, Minimum, and Absolute Value using the Math object. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-Extra-P1</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter a number:"));
        document.write("Maths.abs="+Math.abs(n)+"</br>");
        document.write("Maths.max="+Math.max(23,28,16,37)+"</br>");
        document.write("Maths.min="+Math.min(23,28,16,37)+"</br>");
    </script>
</body>
</html>
