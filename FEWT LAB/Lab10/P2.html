<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab10-P2</title>
</head>
<body>
    <p id="message"></p>
    <script>
        document.addEventListener("mousedown", (event) =>{
            if(event.button==0){
                document.getElementById("message").innerHTML="Left Clicked";
            }else if(event.button==2){
                document.getElementById("message").innerHTML="Right Clicked";
            }else if(event.button==1){
                document.getElementById("message").innerHTML="Scroll";
            }
        })

        document.addEventListener("contextmenu", (event)=>{
            event.preventDefault();
        })
    </script>
</body>
</html>
