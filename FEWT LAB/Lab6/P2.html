<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-6-P2</title>
</head>
<body>
    <script>
        let arr=[20,40,30,10,50]
        document.write("arr: "+arr+"</br>")
        document.write("arr.push(60): "+arr.push(60)+"</br>")
        document.write("arr.pop(): "+arr.pop()+"</br>")
        document.write("arr: "+arr+"</br>")
        document.write("arr.shift(): "+arr.shift()+"</br>")
        document.write("arr: "+arr+"</br>")
        document.write("arr.unshift(10): "+arr.unshift(10)+"</br>")
        document.write("arr.splice(2,1,25): "+arr.splice(2,1,25)+"</br>")
        document.write("arr.slice(1,3): "+arr.slice(1,3)+"</br>")
        document.write("arr: "+arr+"</br>")
        document.write("arr.sort(): "+arr.sort()+"</br>")
        document.write("arr.reverse(): "+arr.reverse()+"</br>")
        document.write("arr.concat([60,70]): "+arr.concat([60,70])+"</br>")
        document.write("arr.indexOf(60): "+arr.indexOf(60)+"</br>")
        document.write("arr.lastIndexOf(60): "+arr.lastIndexOf(60)+"</br>")
        document.write("arr.includes(40): "+arr.includes(40)+"</br>")
        document.write("arr.join('-'): "+arr.join('-')+"</br>")
        document.write("arr.toString(): "+arr.toString()+"</br>")
        document.write("arr.find():"+arr.find(x=>x>30)+"</br>")
        document.write("arr.findIndex():"+arr.findIndex(x=>x>30)+"</br>")
        document.write("arr.filter():"+arr.filter(x=>x>30)+"</br>")
        document.write("arr.map():"+arr.map(x=>x*2)+"</br>")
        document.write("arr.forEach():"+arr.forEach(x=>console.log(x))+"</br>")
        document.write("arr.reduce():"+arr.reduce((a,b)=>a+b,0)+"</br>")
        document.write("arr.some():"+arr.some(x=>x>30)+"</br>")
        document.write("arr.every():"+arr.every(x=>x>5)+"</br>")
        document.write("arr.fill(0,1,2): "+arr.fill(0,1,2)+"</br>")
        document.write("arr.copyWithin(0,3): "+arr.copyWithin(0,3)+"</br>")
    </script>
</body>
</html>
