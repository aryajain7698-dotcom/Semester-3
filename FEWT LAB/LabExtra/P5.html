<!-- Calculate a person's Age from their Date of Birth. -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab-Extra-P5</title>
</head>
<body>
    <script>
        let n=parseInt(prompt("Enter your Year of Birth (YYYY):"));
        let n1=new Date();
        document.write("Age="+ (n1.getFullYear() - n) +" years</br>");
    </script>
</body>
</html>
